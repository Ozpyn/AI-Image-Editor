<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="900" fill="#F8F3EA"/>
  <rect x="40" y="36" width="1520" height="828" rx="28" fill="#FCF8F1" stroke="#E6D4BC" stroke-width="3"/>

  <rect x="300" y="34" width="1000" height="88" rx="28" fill="#FFF6E8" stroke="#D8896B" stroke-width="4"/>
  <text x="800" y="88" text-anchor="middle" fill="#2E3440" font-family="Arial, sans-serif" font-size="40" font-weight="700">
    How the AI Image Editor Works End-to-End
  </text>

  <rect x="90" y="180" width="340" height="220" rx="26" fill="#EAF4FF" stroke="#6FA8DC" stroke-width="4"/>
  <text x="120" y="230" fill="#2E3440" font-family="Arial, sans-serif" font-size="28" font-weight="700">
    1. Frontend UI (React)
  </text>
  <text x="120" y="275" fill="#405065" font-family="Arial, sans-serif" font-size="22">
    <tspan x="120" dy="0">- User loads an image</tspan>
    <tspan x="120" dy="34">- Picks tools from MenuBar / ToolBox</tspan>
    <tspan x="120" dy="34">- Sets prompt and AI options</tspan>
    <tspan x="120" dy="34">- Uses Properties Panel controls</tspan>
  </text>

  <rect x="500" y="180" width="340" height="220" rx="26" fill="#EEF8EC" stroke="#87B67A" stroke-width="4"/>
  <text x="530" y="230" fill="#2E3440" font-family="Arial, sans-serif" font-size="28" font-weight="700">
    2. Canvas Layer
  </text>
  <text x="530" y="275" fill="#405065" font-family="Arial, sans-serif" font-size="22">
    <tspan x="530" dy="0">- CanvasArea creates Fabric canvas</tspan>
    <tspan x="530" dy="34">- useCanvas manages tool state</tspan>
    <tspan x="530" dy="34">- Exports image and mask as PNG blobs</tspan>
    <tspan x="530" dy="34">- Applies returned result back to canvas</tspan>
  </text>

  <rect x="910" y="180" width="340" height="220" rx="26" fill="#FFF4DE" stroke="#E1A94B" stroke-width="4"/>
  <text x="940" y="230" fill="#2E3440" font-family="Arial, sans-serif" font-size="28" font-weight="700">
    3. API Bridge
  </text>
  <text x="940" y="275" fill="#405065" font-family="Arial, sans-serif" font-size="22">
    <tspan x="940" dy="0">- useAiFeatures sends POST requests</tspan>
    <tspan x="940" dy="34">- /api/inpaint, /outpaint, /deblur</tspan>
    <tspan x="940" dy="34">- /removebg, /replacebg, /describeme</tspan>
    <tspan x="940" dy="34">- Polls /api/task/&lt;task_id&gt; for results</tspan>
  </text>

  <rect x="370" y="500" width="390" height="240" rx="26" fill="#FFEDED" stroke="#D77C7C" stroke-width="4"/>
  <text x="400" y="550" fill="#2E3440" font-family="Arial, sans-serif" font-size="28" font-weight="700">
    4. Flask Backend
  </text>
  <text x="400" y="595" fill="#405065" font-family="Arial, sans-serif" font-size="22">
    <tspan x="400" dy="0">- Receives image, mask, prompt, directions</tspan>
    <tspan x="400" dy="34">- Starts worker thread for heavy AI jobs</tspan>
    <tspan x="400" dy="34">- Stores status in task_storage</tspan>
    <tspan x="400" dy="34">- Returns task id, progress, or final PNG</tspan>
  </text>

  <rect x="860" y="500" width="520" height="240" rx="26" fill="#F3EEFF" stroke="#8C78C9" stroke-width="4"/>
  <text x="890" y="550" fill="#2E3440" font-family="Arial, sans-serif" font-size="28" font-weight="700">
    5. AI Processing
  </text>
  <text x="890" y="595" fill="#405065" font-family="Arial, sans-serif" font-size="22">
    <tspan x="890" dy="0">- Stable Diffusion Inpainting for fill / outpaint</tspan>
    <tspan x="890" dy="34">- Stable Diffusion Img2Img for deblur</tspan>
    <tspan x="890" dy="34">- BLIP captioning when prompt is missing</tspan>
    <tspan x="890" dy="34">- rembg removes background from subject</tspan>
  </text>

  <rect x="100" y="510" width="190" height="170" rx="24" fill="#FFF6E8" stroke="#D8896B" stroke-width="4"/>
  <text x="195" y="565" text-anchor="middle" fill="#2E3440" font-family="Arial, sans-serif" font-size="26" font-weight="700">
    Result
  </text>
  <text x="125" y="605" fill="#405065" font-family="Arial, sans-serif" font-size="20">
    <tspan x="125" dy="0">Updated image</tspan>
    <tspan x="125" dy="30">is rendered in</tspan>
    <tspan x="125" dy="30">the editor UI</tspan>
  </text>

  <defs>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#5D94C6"/>
    </marker>
    <marker id="arrowRed" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#CC7676"/>
    </marker>
    <marker id="arrowGold" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#D29E45"/>
    </marker>
    <marker id="arrowPurple" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#7E69C7"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#74A869"/>
    </marker>
  </defs>

  <path d="M430 290H490" stroke="#5D94C6" stroke-width="6" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
  <path d="M840 290H900" stroke="#D29E45" stroke-width="6" stroke-linecap="round" marker-end="url(#arrowGold)"/>
  <path d="M1080 405V470H585" stroke="#CC7676" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowRed)"/>
  <path d="M760 620H850" stroke="#7E69C7" stroke-width="6" stroke-linecap="round" marker-end="url(#arrowPurple)"/>
  <path d="M860 700C780 780 540 800 300 670" stroke="#5D94C6" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowBlue)"/>
  <path d="M370 620H300" stroke="#74A869" stroke-width="6" stroke-linecap="round" marker-end="url(#arrowGreen)"/>

  <text x="1115" y="445" fill="#9B5858" font-family="Arial, sans-serif" font-size="20" font-weight="700">
    async jobs
  </text>
  <text x="1030" y="775" fill="#4E7BAA" font-family="Arial, sans-serif" font-size="20" font-weight="700">
    result blob returned to frontend
  </text>
</svg>
